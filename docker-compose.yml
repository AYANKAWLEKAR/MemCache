

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16-trixie
    environment:
      POSTGRES_USER: memcache
      POSTGRES_PASSWORD: memcache
      POSTGRES_DB: memcache
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memcache -d memcache"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/dummy-neo4j-password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # Celery worker (opt-in): docker compose --profile worker up worker
  # Set OLLAMA_BASE_URL=http://host.docker.internal:11434 if Ollama runs on the host (macOS/Windows).
  worker:
    profiles:
      - worker
    image: python:3.12-bookworm
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      POSTGRES_URL: postgresql://memcache:memcache@postgres:5432/memcache
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: dummy-neo4j-password
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt
      && python -m spacy download en_core_web_sm
      && celery -A app.workers.celery_app worker --loglevel=info"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  neo4j_data:
